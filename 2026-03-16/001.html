<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT-4o - AI 工具评测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .back { color: #666; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 30px; }
        .back:hover { color: #00d9ff; }
        
        .header { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .header a { color: #00d9ff; text-decoration: none; }
        .header a:hover { text-decoration: underline; }
        
        .stars { color: #ffc107; font-size: 28px; letter-spacing: 4px; margin: 15px 0; }
        
        .tag {
            display: inline-block;
            padding: 5px 14px;
            background: rgba(0,255,136,0.12);
            color: #00ff88;
            border-radius: 14px;
            font-size: 13px;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        
        .section {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .section h2 {
            font-size: 1.15rem;
            color: #00d9ff;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        
        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .score-row:last-child { border: none; }
        .score-label { color: #aaa; font-size: 15px; }
        .score-value { font-weight: 600; font-size: 16px; }
        .score-good { color: #00ff88; }
        .score-mid { color: #ffc107; }
        .score-bad { color: #ff6b6b; }
        
        .score-bar {
            width: 140px;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
            display: inline-block;
            margin-left: 15px;
            vertical-align: middle;
        }
        .score-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s;
        }
        
        .verdict { font-size: 15px; line-height: 1.9; color: #ddd; }
        
        .pending {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255,193,7,0.05);
            border: 1px dashed rgba(255,193,7,0.3);
            border-radius: 12px;
        }
        .pending-icon { font-size: 42px; margin-bottom: 15px; }
        .pending h2 { color: #ffc107; border: none; padding: 0; margin-bottom: 12px; }
        .pending p { color: #888; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <a href="./list.html" class="back">← 返回列表</a>
        
        <div class="header">
            <h1>GPT-4o</h1>
            <a href="https://openai.com/index/gpt-4o/" target="_blank">访问官网 →</a>
            <div class="stars">☆☆☆☆☆</div>
            <div>
                <span class="tag">LLM</span>
                <span class="tag">多模态</span>
                <span class="tag">官方</span>
            </div>
        </div>
        
        <div class="pending">
            <div class="pending-icon">⏳</div>
            <h2>待评测</h2>
            <p>该工具已加入评测队列，将在本地实机测试后发布详细评测报告。<br>评测维度：易用性、实用性、是否夸大、推荐星级</p>
        </div>
        
        <div class="section">
            <h2>📝 简介</h2>
            <p style="color:#ccc;line-height:1.7;">OpenAI 最新发布的多模态大模型，可以实时处理文本、音频和图像输入，支持实时语音对话，比现有模型更快更强。GPT-4o 中的"o"代表"omni"，意为"全能"。</p>
        </div>
        
        <div class="section">
            <h2>🎯 评测维度（待测试）</h2>
            <div class="score-row">
                <span class="score-label">易用性</span>
                <span><span class="score-value">-</span></span>
            </div>
            <div class="score-row">
                <span class="score-label">实用性</span>
                <span><span class="score-value">-</span></span>
            </div>
            <div class="score-row">
                <span class="score-label">是否夸大</span>
                <span><span class="score-value">-</span></span>
            </div>
            <div class="score-row">
                <span class="score-label">推荐指数</span>
                <span><span class="score-value">-</span></span>
            </div>
        </div>
    </div>
</body>
</html>
