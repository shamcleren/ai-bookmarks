<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="../calendar.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devin - AI 工具评测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .back { color: #666; text-decoration: none; font-size: 14px; display: inline-block; margin-bottom: 30px; }
        .back:hover { color: #00d9ff; }
        .header { margin-bottom: 40px; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h1 { font-size: 2rem; margin-bottom: 12px; }
        .header a { color: #00d9ff; text-decoration: none; }
        .stars { color: #ffc107; font-size: 28px; letter-spacing: 4px; margin: 15px 0; }
        .tag { display: inline-block; padding: 5px 14px; background: rgba(0,255,136,0.12); color: #00ff88; border-radius: 14px; font-size: 13px; margin-right: 8px; margin-bottom: 8px; }
        .section { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .section h2 { font-size: 1.15rem; color: #00d9ff; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .feature-list { color: #ccc; line-height: 2; }
        .feature-list li { margin-bottom: 8px; }
        .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .pros, .cons { padding: 20px; border-radius: 10px; }
        .pros { background: rgba(0,255,136,0.08); }
        .cons { background: rgba(255,107,107,0.08); }
        .pros h3 { color: #00ff88; margin-bottom: 12px; }
        .cons h3 { color: #ff6b6b; margin-bottom: 12px; }
        .pros li, .cons li { color: #ccc; margin-bottom: 8px; }
        .pending { text-align: center; padding: 50px 20px; background: rgba(255,193,7,0.05); border: 1px dashed rgba(255,193,7,0.3); border-radius: 12px; margin-bottom: 20px; }
        .pending-icon { font-size: 42px; margin-bottom: 15px; }
        .pending h2 { color: #ffc107; border: none; padding: 0; margin-bottom: 12px; }
        .pending p { color: #888; line-height: 1.6; }
        @media (max-width: 600px) { .pros-cons { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="list.html" class="back">← 返回列表</a>
        <div class="header">
            <h1>Devin</h1>
            <a href="https://docs.devin.ai" target="_blank">访问官网 →</a>
            <div class="stars">☆☆☆☆☆</div>
            <div><span class="tag">编程
