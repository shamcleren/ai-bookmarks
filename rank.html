<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 工具榜 - AI 工具评测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .nav a {
            color: #666;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab:hover { color: #fff; }
        .tab.active {
            color: #ffd700;
            background: rgba(255,215,0,0.1);
        }
        
        .rank-list { display: grid; gap: 15px; }
        
        .rank-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .rank-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,215,0,0.3);
        }
        
        .rank-num {
            font-size: 28px;
            font-weight: bold;
            width: 50px;
            text-align: center;
        }
        .rank-num.gold { color: #ffd700; }
        .rank-num.silver { color: #c0c0c0; }
        .rank-num.bronze { color: #cd7f32; }
        
        .rank-content { flex: 1; }
        .rank-content h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        .rank-content h3 a {
            color: #00d9ff;
            text-decoration: none;
        }
        .rank-content h3 a:hover { text-decoration: underline; }
        .rank-content .desc {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .rank-content .meta {
            display: flex;
            gap: 10px;
            font-size: 12px;
        }
        
        .stars {
            color: #ffd700;
            font-size: 16px;
            letter-spacing: 2px;
        }
        
        .tag {
            padding: 3px 10px;
            background: rgba(0,255,136,0.15);
            color: #00ff88;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .score-badge {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #000;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .empty {
            text-align: center;
            color: #666;
            padding: 60px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 AI 工具榜</h1>
        <p class="subtitle">实测评分 | 拒绝云评测</p>
        
        <div class="nav">
            <a href="index.html">🏠 首页</a>
            <a href="rank.html" class="active">🏆 榜单</a>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-sort="stars">⭐ 综合榜</button>
            <button class="tab" data-sort="ease">🎯 易用性</button>
            <button class="tab" data-sort="useful">💪 实用性</button>
        </div>
        
        <div class="rank-list" id="rankList">
            <!-- 动态渲染 -->
        </div>
    </div>

    <script>
        // 评测数据 - 后续从 JSON 加载
        const tools = [
            {
                id: '001',
                title: 'OpenAI GPT-4o',
                url: '2026-03-16/001.html',
                desc: '多模态 AI 模型，支持文本、音频、图像实时处理',
                tags: ['LLM', '多模态'],
                stars: 5,
                easeScore: 9.0,
                usefulScore: 9.5,
                date: '2026-03-16'
            },
            {
                id: '002',
                title: 'Cursor 0.3',
                url: '2026-03-16/002.html',
                desc: 'AI 编程助手，支持全局代码库搜索',
                tags: ['编程', 'AI助手'],
                stars: 0, // 待评测
                easeScore: 0,
                usefulScore: 0,
                date: '2026-03-16'
            },
            {
                id: '003',
                title: 'Windsurf',
                url: '2026-03-16/003.html',
                desc: '新型 AI 编程工具，专注开发者体验',
                tags: ['编程'],
                stars: 0,
                easeScore: 0,
                usefulScore: 0,
                date: '2026-03-16'
            }
        ];

        const rankList = document.getElementById('rankList');
        const tabs = document.querySelectorAll('.tab');
        let currentSort = 'stars';

        function getRankClass(idx) {
            if (idx === 0) return 'gold';
            if (idx === 1) return 'silver';
            if (idx === 2) return 'bronze';
            return '';
        }

        function render() {
            // 只显示已评测的
            const rated = tools.filter(t => t.stars > 0);
            
            // 排序
            if (currentSort === 'stars') {
                rated.sort((a, b) => b.stars - a.stars);
            } else if (currentSort === 'ease') {
                rated.sort((a, b) => b.easeScore - a.easeScore);
            } else if (currentSort === 'useful') {
                rated.sort((a, b) => b.usefulScore - a.usefulScore);
            }

            if (!rated.length) {
                rankList.innerHTML = '<div class="empty">暂无评测数据</div>';
                return;
            }

            rankList.innerHTML = rated.map((t, idx) => {
                const numClass = getRankClass(idx);
                const stars = '★'.repeat(t.stars) + '☆'.repeat(5 - t.stars);
                const score = currentSort === 'stars' ? t.stars + '.0' : 
                              currentSort === 'ease' ? t.easeScore : t.usefulScore;
                
                return '<div class="rank-item"><div class="rank-num ' + numClass + '">' + (idx + 1) + '</div><div class="rank-content"><h3><a href="' + t.url + '">' + t.title + '</a></h3><p class="desc">' + t.desc + '</p><div class="meta"><span class="stars">' + stars + '</span>' + t.tags.map(tag => '<span class="tag">' + tag + '</span>').join('') + '</div></div><div class="score-badge">' + score + '</div></div>';
            }).join('');
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSort = tab.dataset.sort;
                render();
            });
        });

        render();
    </script>
</body>
</html>
