<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="calendar.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 工具榜 - AI 工具评测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .nav a {
            color: #888;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .nav a:hover, .nav a.active { color: #fff; background: rgba(255,255,255,0.1); }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }
        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 15px;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab:hover { color: #fff; }
        .tab.active { color: #ffd700; background: rgba(255,215,0,0.1); }
        
        .rank-list { display: grid; gap: 15px; }
        
        .rank-item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .rank-item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,215,0,0.2);
        }
        
        .rank-num {
            font-size: 28px;
            font-weight: bold;
            width: 50px;
            text-align: center;
        }
        .rank-num.gold { color: #ffd700; }
        .rank-num.silver { color: #c0c0c0; }
        .rank-num.bronze { color: #cd7f32; }
        
        .rank-content { flex: 1; }
        .rank-content h3 { font-size: 17px; margin-bottom: 8px; }
        .rank-content h3 a { color: #00d9ff; text-decoration: none; }
        .rank-content h3 a:hover { text-decoration: underline; }
        .rank-content .desc { color: #aaa; font-size: 13px; margin-bottom: 10px; }
        .rank-content .meta { display: flex; gap: 10px; font-size: 12px; }
        
        .stars { color: #ffd700; font-size: 14px; letter-spacing: 2px; }
        
        .tag {
            padding: 3px 10px;
            background: rgba(0,255,136,0.12);
            color: #00ff88;
            border-radius: 12px;
            font-size: 11px;
        }
        
        .score-badge {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #000;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
        }
        
        .empty { text-align: center; color: #666; padding: 60px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 AI 工具榜</h1>
        <p class="subtitle">实测评分 | 拒绝云评测</p>
        
        <div class="nav">
            <a href="index.html">🏠 首页</a>
            <a href="rank.html" class="active">🏆 榜单</a>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-sort="stars">⭐ 综合榜</button>
            <button class="tab" data-sort="ease">🎯 易用性</button>
            <button class="tab" data-sort="useful">💪 实用性</button>
            <button class="tab" data-sort="hype">📉 防坑</button>
        </div>
        
        <div class="rank-list" id="rankList">
            <div class="empty">暂无评测数据</div>
        </div>
    </div>

    <script>
        let allTools = [];
        
        // 加载所有日期的数据
        async function loadData() {
            try {
                const res = await fetch('2026-03-16/tools.json');
                const data = await res.json();
                allTools = data.tools.filter(t => t.status === 'rated');
                render();
            } catch(e) {
                console.log('No data yet');
            }
        }
        
        function getRankClass(idx) {
            if (idx === 0) return 'gold';
            if (idx === 1) return 'silver';
            if (idx === 2) return 'bronze';
            return '';
        }

        function render() {
            const rankList = document.getElementById('rankList');
            
            if (!allTools.length) {
                rankList.innerHTML = '<div class="empty">暂无评测数据<br><small>评测完成后自动上榜</small></div>';
                return;
            }
            
            let sorted = [...allTools];
            if (currentSort === 'stars') {
                sorted.sort((a, b) => b.stars - a.stars);
            } else if (currentSort === 'ease') {
                sorted.sort((a, b) => b.easeScore - a.easeScore);
            } else if (currentSort === 'useful') {
                sorted.sort((a, b) => b.usefulScore - a.usefulScore);
            } else if (currentSort === 'hype') {
                sorted.sort((a, b) => a.hypeScore - b.hypeScore); // 低分防坑
            }

            rankList.innerHTML = sorted.map((t, idx) => {
                const numClass = getRankClass(idx);
                const stars = '★'.repeat(t.stars) + '☆'.repeat(5 - t.stars);
                const score = currentSort === 'stars' ? t.stars + '.0' : 
                              currentSort === 'ease' ? t.easeScore : 
                              currentSort === 'useful' ? t.usefulScore : t.hypeScore + '/10';
                
                return '<div class="rank-item"><div class="rank-num ' + numClass + '">' + (idx + 1) + '</div><div class="rank-content"><h3><a href="2026-03-16/' + t.id + '.html">' + t.name + '</a></h3><p class="desc">' + t.desc + '</p><div class="meta"><span class="stars">' + stars + '</span>' + t.tags.map(tag => '<span class="tag">' + tag + '</span>').join('') + '</div></div><div class="score-badge">' + score + '</div></div>';
            }).join('');
        }

        const tabs = document.querySelectorAll('.tab');
        let currentSort = 'stars';
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSort = tab.dataset.sort;
                render();
            });
        });

        loadData();
    </script>
</body>
</html>
