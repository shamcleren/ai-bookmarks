<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 工具评测 - 每日 AI 工具深度评测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        .nav a {
            color: #888;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            transition: all 0.3s;
            font-size: 15px;
        }
        .nav a:hover, .nav a.active { color: #00d9ff; background: rgba(0,217,255,0.15); }
        
        .latest {
            background: rgba(0,217,255,0.08);
            border: 1px solid rgba(0,217,255,0.2);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }
        .latest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .latest-date {
            font-size: 14px;
            color: #00d9ff;
            background: rgba(0,217,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
        }
        .latest-title { font-size: 1.3rem; margin-bottom: 20px; color: #ddd; }
        
        .item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(0,217,255,0.2);
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .item h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .item h3 a { color: #00d9ff; text-decoration: none; }
        .item h3 a:hover { text-decoration: underline; }
        .item .desc { color: #999; font-size: 13px; line-height: 1.5; }
        .item .meta { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-top: 12px; flex-wrap: wrap; }
        
        .tag {
            padding: 3px 10px;
            background: rgba(0,255,136,0.12);
            color: #00ff88;
            border-radius: 12px;
            font-size: 11px;
        }
        .tag.rated { background: rgba(255,193,7,0.15); color: #ffc107; }
        .tag.pending { background: rgba(100,100,100,0.2); color: #888; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; }
        .badge-test { background: rgba(138,43,226,0.2); color: #b366ff; }
        
        .history {
            margin-top: 50px;
        }
        .history h2 { font-size: 1.3rem; margin-bottom: 20px; color: #888; }
        .history-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .history-item {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            color: #888;
            transition: all 0.3s;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.1);
            color: #00d9ff;
        }
        .history-date { font-size: 14px; }
        .history-count { font-size: 12px; color: #666; margin-top: 5px; }
        
        .loading { text-align: center; color: #666; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ AI 工具评测</h1>
        <p class="subtitle">每日 AI 工具深度评测 | 拒绝云评测，实测才是真</p>
        
        <div class="nav">
            <a href="index.html" class="active">🏠 首页</a>
            <a href="rank.html">🏆 榜单</a>
        </div>
        
        <div class="latest" id="latest">
            <div class="loading">加载中...</div>
        </div>
        
        <div class="history">
            <h2>📚 历史期刊</h2>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        // 历史期刊列表
        const historyData = [
            { date: '2026-03-16', count: 10 }
        ];
        
        document.getElementById('historyList').innerHTML = historyData.map(h => 
            '<a href="' + h.date + '/list.html" class="history-item"><div class="history-date">' + h.date.slice(5) + '</div><div class="history-count">' + h.count + ' 条</div></a>'
        ).join('');
        
        // 加载最新一期
        fetch('2026-03-16/tools.json')
            .then(r => r.json())
            .then(data => {
                const latest = document.getElementById('latest');
                const rated = data.tools.filter(t => t.status === 'rated').length;
                
                let html = '<div class="latest-header"><span class="latest-date">📅 ' + data.date + '</span><span style="color:#666;font-size:13px;">第 ' + data.issue + ' 期</span></div>';
                html += '<div class="latest-title">本期收录 ' + data.tools.length + ' 款 AI 工具 <span style="color:#ffc107;font-size:14px;">(' + rated + ' 已评测)</span></div>';
                
                html += data.tools.slice(0, 10).map(t => {
                    const statusTag = t.status === 'rated' 
                        ? '<span class="tag rated">⭐ 已评测</span>' 
                        : '<span class="tag pending">待评测</span>';
                    const testBadge = t.canTest 
                        ? '<span class="badge badge-test">🤖 可评测</span>' : '';
                    
                    return '<div class="item"><div class="item-header"><h3><a href="' + data.date + '/' + t.id + '.html">' + t.name + '</a></h3>' + statusTag + '</div><p class="desc">' + t.desc + '</p><div class="meta">' + t.tags.slice(0,3).map(tag => '<span class="tag">' + tag + '</span>').join('') + testBadge + '</div></div>';
                }).join('');
                
                html += '<div class="item" style="text-align:center;"><a href="' + data.date + '/list.html" style="color:#00d9ff;text-decoration:none;">查看全部 ' + data.tools.length + ' 条 →</a></div>';
                
                latest.innerHTML = html;
            })
            .catch(e => {
                document.getElementById('latest').innerHTML = '<div class="loading">暂无数据</div>';
            });
    </script>
</body>
</html>
