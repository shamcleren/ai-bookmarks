<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 工具评测 - 每日 AI 工具深度评测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        
        .nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav a {
            color: #888;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            transition: all 0.3s;
            font-size: 15px;
        }
        .nav a:hover, .nav a.active { color: #00d9ff; background: rgba(0,217,255,0.15); }
        
        .calendar {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .calendar-header h3 { color: #00d9ff; font-size: 16px; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .calendar-day {
            text-align: center;
            padding: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }
        .calendar-day:hover {
            background: rgba(0,217,255,0.2);
            color: #00d9ff;
        }
        .calendar-day.header {
            color: #666;
            font-size: 12px;
            cursor: default;
        }
        .calendar-day.header:hover { background: transparent; }
        .calendar-day.has-data {
            background: rgba(0,255,136,0.15);
            color: #00ff88;
        }
        .calendar-day.has-data:hover {
            background: rgba(0,255,136,0.3);
        }
        .calendar-day.empty { cursor: default; }
        .calendar-day.empty:hover { background: transparent; }
        
        .latest {
            background: rgba(0,217,255,0.08);
            border: 1px solid rgba(0,217,255,0.2);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 40px;
        }
        .latest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .latest-date {
            font-size: 14px;
            color: #00d9ff;
            background: rgba(0,217,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
        }
        .latest-title { font-size: 1.3rem; margin-bottom: 20px; color: #ddd; }
        
        .item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .item:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(0,217,255,0.2);
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .item h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .item h3 a { color: #00d9ff; text-decoration: none; }
        .item h3 a:hover { text-decoration: underline; }
        .item .desc { color: #999; font-size: 13px; line-height: 1.5; }
        .item .meta { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-top: 12px; flex-wrap: wrap; }
        
        .tag {
            padding: 3px 10px;
            background: rgba(0,255,136,0.12);
            color: #00ff88;
            border-radius: 12px;
            font-size: 11px;
        }
        .tag.rated { background: rgba(255,193,7,0.15); color: #ffc107; }
        .tag.pending { background: rgba(100,100,100,0.2); color: #888; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; }
        .badge-test { background: rgba(138,43,226,0.2); color: #b366ff; }
        
        .loading { text-align: center; color: #666; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ AI 工具评测</h1>
        <p class="subtitle">每日 AI 工具深度评测 | 拒绝云评测，实测才是真</p>
        
        <div class="nav">
            <a href="index.html" class="active">🏠 首页</a>
            <a href="rank.html">🏆 榜单</a>
        </div>
        
        <!-- 日历选择器 -->
        <div class="calendar">
            <div class="calendar-header">
                <h3>📅 选择日期</h3>
            </div>
            <div class="calendar-grid" id="calendar"></div>
        </div>
        
        <div class="latest" id="latest">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script>
        const datesWithData = ['2026-03-16'];
        
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const year = 2026;
            const month = 2; // March (0-indexed)
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const headers = ['日', '一', '二', '三', '四', '五', '六'];
            let html = headers.map(h => '<div class="calendar-day header">' + h + '</div>').join('');
            
            // Empty cells before first day
            for (let i = 0; i < firstDay; i++) {
                html += '<div class="calendar-day empty"></div>';
            }
            
            // Days
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = '2026-03-' + (day < 10 ? '0' + day : day);
                const hasData = datesWithData.includes(dateStr);
                const isToday = day === 16;
                
                html += '<div class="calendar-day' + (hasData ? ' has-data' : '') + (isToday ? '" style="border:1px solid #00d9ff;"' : '') + '"' + 
                    (hasData ? ' onclick="window.location.href=\'' + dateStr + '/list.html\'"' : '') + '>' + day + '</div>';
            }
            
            calendar.innerHTML = html;
        }
        
        fetch('2026-03-16/tools.json')
            .then(r => r.json())
            .then(data => {
                const latest = document.getElementById('latest');
                const rated = data.tools.filter(t => t.status === 'rated').length;
                
                let html = '<div class="latest-header"><span class="latest-date">📅 ' + data.date + '</span><span style="color:#666;font-size:13px;">第 ' + data.issue + ' 期</span></div>';
                html += '<div class="latest-title">本期收录 ' + data.tools.length + ' 款 AI 工具 <span style="color:#ffc107;font-size:14px;">(' + rated + ' 已评测)</span></div>';
                
                html += data.tools.slice(0, 10).map(t => {
                    const statusTag = t.status === 'rated' 
                        ? '<span class="tag rated">⭐ 已评测</span>' 
                        : '<span class="tag pending">待评测</span>';
                    const testBadge = t.canTest 
                        ? '<span class="badge badge-test">🤖 可评测</span>' : '';
                    
                    return '<div class="item"><div class="item-header"><h3><a href="' + data.date + '/' + t.id + '.html">' + t.name + '</a></h3>' + statusTag + '</div><p class="desc">' + t.desc + '</p><div class="meta">' + t.tags.slice(0,3).map(tag => '<span class="tag">' + tag + '</span>').join('') + testBadge + '</div></div>';
                }).join('');
                
                latest.innerHTML = html;
            })
            .catch(e => {
                document.getElementById('latest').innerHTML = '<div class="loading">暂无数据</div>';
            });
        
        renderCalendar();
    </script>
</body>
</html>
